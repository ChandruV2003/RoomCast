services:
  roomcast:
    build:
      context: .
      dockerfile: Dockerfile.roomcast
    container_name: roomcast
    restart: unless-stopped
    ports:
      - "1967:1967"
    environment:
      ROOMCAST_DB_PATH: ${ROOMCAST_DB_PATH:-/app/data/roomcast.db}
      ROOMCAST_SECRET_KEY: ${ROOMCAST_SECRET_KEY:-change-me}
      ROOMCAST_DEFAULT_PIN: ${ROOMCAST_DEFAULT_PIN:-7070}
      ROOMCAST_PUBLIC_NAME: ${ROOMCAST_PUBLIC_NAME:-NTC Newark WebCall}
      ROOMCAST_LISTENER_NAME: ${ROOMCAST_LISTENER_NAME:-NTC Newark WebCall}
      ROOMCAST_STREAM_PROFILE: ${ROOMCAST_STREAM_PROFILE:-wav_pcm24}
      ROOMCAST_ADMIN_PASSWORD: ${ROOMCAST_ADMIN_PASSWORD:-change-me}
      ROOMCAST_TELEPHONY_SECRET: ${ROOMCAST_TELEPHONY_SECRET:-change-me}
      ROOMCAST_TWILIO_WEBHOOK_TOKEN: ${ROOMCAST_TWILIO_WEBHOOK_TOKEN:-change-me}
      ROOMCAST_TELNYX_WEBHOOK_TOKEN: ${ROOMCAST_TELNYX_WEBHOOK_TOKEN:-change-me}
      ROOMCAST_TELNYX_TRANSPORT: ${ROOMCAST_TELNYX_TRANSPORT:-websocket}
      ROOMCAST_TELNYX_STREAM_CODEC: ${ROOMCAST_TELNYX_STREAM_CODEC:-PCMU}
      ROOMCAST_TELNYX_STREAM_SAMPLE_RATE: ${ROOMCAST_TELNYX_STREAM_SAMPLE_RATE:-8000}
      ROOMCAST_TELNYX_STREAM_FRAME_MS: ${ROOMCAST_TELNYX_STREAM_FRAME_MS:-20}
    volumes:
      - ./data:/app/data

  roomcast-watchdog:
    build:
      context: .
      dockerfile: Dockerfile.roomcast
    container_name: roomcast-watchdog
    restart: unless-stopped
    depends_on:
      - roomcast
    environment:
      ROOMCAST_DB_PATH: ${ROOMCAST_DB_PATH:-/app/data/roomcast.db}
      ROOMCAST_WATCHDOG_HEARTBEAT_STALE_SECONDS: ${ROOMCAST_WATCHDOG_HEARTBEAT_STALE_SECONDS:-45}
      ROOMCAST_WATCHDOG_STARTUP_GRACE_SECONDS: ${ROOMCAST_WATCHDOG_STARTUP_GRACE_SECONDS:-25}
    volumes:
      - ./data:/app/data
    command:
      - sh
      - -c
      - |
        while true; do
          python3 roomcast_watchdog.py \
            --db-path "$${ROOMCAST_DB_PATH}" \
            --heartbeat-stale-seconds "$${ROOMCAST_WATCHDOG_HEARTBEAT_STALE_SECONDS}" \
            --startup-grace-seconds "$${ROOMCAST_WATCHDOG_STARTUP_GRACE_SECONDS}" \
            --record-incidents \
            --json || true
          sleep 60
        done
