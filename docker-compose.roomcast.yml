services:
  roomcast:
    build:
      context: .
      dockerfile: Dockerfile.roomcast
    container_name: roomcast
    restart: unless-stopped
    ports:
      - "1967:1967"
    environment:
      ROOMCAST_DB_PATH: ${ROOMCAST_DB_PATH:-/app/data/roomcast.db}
      ROOMCAST_SECRET_KEY: ${ROOMCAST_SECRET_KEY:-change-me}
      ROOMCAST_DEFAULT_PIN: ${ROOMCAST_DEFAULT_PIN:-7070}
      ROOMCAST_PUBLIC_NAME: ${ROOMCAST_PUBLIC_NAME:-NTC Newark WebCall}
      ROOMCAST_LISTENER_NAME: ${ROOMCAST_LISTENER_NAME:-NTC Newark WebCall}
      ROOMCAST_CALL_IN_NUMBER: ${ROOMCAST_CALL_IN_NUMBER:-+1 862 872 7904}
      ROOMCAST_CALL_IN_PIN: ${ROOMCAST_CALL_IN_PIN:-7070}
      ROOMCAST_AGENT_PUBLIC_BASE_URL: ${ROOMCAST_AGENT_PUBLIC_BASE_URL:-https://ntcnas.myftp.org/webcall}
      ROOMCAST_TELEPHONY_PUBLIC_BASE_URL: ${ROOMCAST_TELEPHONY_PUBLIC_BASE_URL:-https://ntcnas.myftp.org/webcall}
      ROOMCAST_POST_END_SILENCE_GRACE_SECONDS: ${ROOMCAST_POST_END_SILENCE_GRACE_SECONDS:-300}
      ROOMCAST_STREAM_PROFILE: ${ROOMCAST_STREAM_PROFILE:-wav_pcm24}
      ROOMCAST_BROWSER_GAIN_DB: ${ROOMCAST_BROWSER_GAIN_DB:-0}
      ROOMCAST_ADMIN_PASSWORD: ${ROOMCAST_ADMIN_PASSWORD:-change-me}
      ROOMCAST_TELEPHONY_SECRET: ${ROOMCAST_TELEPHONY_SECRET:-change-me}
      ROOMCAST_TWILIO_WEBHOOK_TOKEN: ${ROOMCAST_TWILIO_WEBHOOK_TOKEN:-change-me}
      ROOMCAST_TELNYX_WEBHOOK_TOKEN: ${ROOMCAST_TELNYX_WEBHOOK_TOKEN:-change-me}
      ROOMCAST_TELEPHONY_MONO_MIX: ${ROOMCAST_TELEPHONY_MONO_MIX:-left}
      ROOMCAST_TELEPHONY_DSP_ENABLED: ${ROOMCAST_TELEPHONY_DSP_ENABLED:-0}
      ROOMCAST_TELEPHONY_GAIN_DB: ${ROOMCAST_TELEPHONY_GAIN_DB:-0}
      ROOMCAST_TELEPHONY_PROMPT_DIR: ${ROOMCAST_TELEPHONY_PROMPT_DIR:-/app/data/prompts}
      ROOMCAST_TWILIO_VERIFY_CODE: ${ROOMCAST_TWILIO_VERIFY_CODE:-}
      ROOMCAST_TWILIO_VERIFY_CALLER_ID: ${ROOMCAST_TWILIO_VERIFY_CALLER_ID:-+14157234000}
      ROOMCAST_TELNYX_TRANSPORT: ${ROOMCAST_TELNYX_TRANSPORT:-websocket}
      ROOMCAST_TELNYX_STREAM_CODEC: ${ROOMCAST_TELNYX_STREAM_CODEC:-G722}
      ROOMCAST_TELNYX_STREAM_SAMPLE_RATE: ${ROOMCAST_TELNYX_STREAM_SAMPLE_RATE:-8000}
      ROOMCAST_TELNYX_STREAM_FRAME_MS: ${ROOMCAST_TELNYX_STREAM_FRAME_MS:-60}
      ROOMCAST_TELNYX_RTP_HEADER_ENABLED: ${ROOMCAST_TELNYX_RTP_HEADER_ENABLED:-0}
      ROOMCAST_TELNYX_STREAM_RECONNECT_ENABLED: ${ROOMCAST_TELNYX_STREAM_RECONNECT_ENABLED:-1}
      ROOMCAST_TELNYX_OPUS_APPLICATION: ${ROOMCAST_TELNYX_OPUS_APPLICATION:-audio}
      ROOMCAST_TELNYX_OPUS_BITRATE: ${ROOMCAST_TELNYX_OPUS_BITRATE:-48000}
      ROOMCAST_TELNYX_OPUS_SIGNAL: ${ROOMCAST_TELNYX_OPUS_SIGNAL:-music}
      ROOMCAST_TELNYX_TEST_SIGNAL: ${ROOMCAST_TELNYX_TEST_SIGNAL:-}
      ROOMCAST_TELNYX_TEST_SIGNAL_HZ: ${ROOMCAST_TELNYX_TEST_SIGNAL_HZ:-440}
      ROOMCAST_TELNYX_TEST_SIGNAL_GAIN: ${ROOMCAST_TELNYX_TEST_SIGNAL_GAIN:-0.18}
      ROOMCAST_TELNYX_DEBUG_TAP_ENABLED: ${ROOMCAST_TELNYX_DEBUG_TAP_ENABLED:-0}
      ROOMCAST_TELNYX_DEBUG_TAP_DIR: ${ROOMCAST_TELNYX_DEBUG_TAP_DIR:-/app/data/telnyx-debug-taps}
      ROOMCAST_TELNYX_DEBUG_TAP_MAX_SECONDS: ${ROOMCAST_TELNYX_DEBUG_TAP_MAX_SECONDS:-300}
      ROOMCAST_TELNYX_SMS_LOG_PATH: ${ROOMCAST_TELNYX_SMS_LOG_PATH:-/app/data/telnyx-sms-webhooks.jsonl}
      ROOMCAST_HLS_PLAYLIST_LENGTH: ${ROOMCAST_HLS_PLAYLIST_LENGTH:-12}
      ROOMCAST_HLS_DELETE_THRESHOLD: ${ROOMCAST_HLS_DELETE_THRESHOLD:-12}
      ROOMCAST_HLS_AUDIO_BITRATE: ${ROOMCAST_HLS_AUDIO_BITRATE:-256k}
      ROOMCAST_HLS_START_TIMEOUT_SECONDS: ${ROOMCAST_HLS_START_TIMEOUT_SECONDS:-8.0}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import json, urllib.request; data=json.load(urllib.request.urlopen('http://127.0.0.1:1967/healthz', timeout=3)); raise SystemExit(0 if data.get('ok') else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  roomcast-watchdog:
    build:
      context: .
      dockerfile: Dockerfile.roomcast
    container_name: roomcast-watchdog
    restart: unless-stopped
    depends_on:
      - roomcast
    environment:
      ROOMCAST_DB_PATH: ${ROOMCAST_DB_PATH:-/app/data/roomcast.db}
      ROOMCAST_WATCHDOG_HEARTBEAT_STALE_SECONDS: ${ROOMCAST_WATCHDOG_HEARTBEAT_STALE_SECONDS:-45}
      ROOMCAST_WATCHDOG_STARTUP_GRACE_SECONDS: ${ROOMCAST_WATCHDOG_STARTUP_GRACE_SECONDS:-25}
      ROOMCAST_WATCHDOG_HEALTH_URL: ${ROOMCAST_WATCHDOG_HEALTH_URL:-http://roomcast:1967/healthz}
      ROOMCAST_WATCHDOG_HEALTH_TIMEOUT_SECONDS: ${ROOMCAST_WATCHDOG_HEALTH_TIMEOUT_SECONDS:-3}
      ROOMCAST_WATCHDOG_BASE_URL: ${ROOMCAST_WATCHDOG_BASE_URL:-http://roomcast:1967}
      ROOMCAST_WATCHDOG_PUBLIC_PIN: ${ROOMCAST_WATCHDOG_PUBLIC_PIN:-7070}
      ROOMCAST_POST_END_SILENCE_GRACE_SECONDS: ${ROOMCAST_POST_END_SILENCE_GRACE_SECONDS:-300}
      ROOMCAST_WATCHDOG_CLIENT_TIMEOUT_SECONDS: ${ROOMCAST_WATCHDOG_CLIENT_TIMEOUT_SECONDS:-4}
      ROOMCAST_WATCHDOG_HLS_TIMEOUT_SECONDS: ${ROOMCAST_WATCHDOG_HLS_TIMEOUT_SECONDS:-12}
      ROOMCAST_LEVEL_MONITOR_ENABLED: ${ROOMCAST_LEVEL_MONITOR_ENABLED:-1}
      ROOMCAST_LEVEL_MONITOR_LOW_DB: ${ROOMCAST_LEVEL_MONITOR_LOW_DB:--42}
      ROOMCAST_LEVEL_MONITOR_HOT_PEAK_DB: ${ROOMCAST_LEVEL_MONITOR_HOT_PEAK_DB:--1}
      ROOMCAST_LEVEL_MONITOR_WINDOW_SECONDS: ${ROOMCAST_LEVEL_MONITOR_WINDOW_SECONDS:-300}
      ROOMCAST_LEVEL_MONITOR_MIN_SAMPLES: ${ROOMCAST_LEVEL_MONITOR_MIN_SAMPLES:-3}
      ROOMCAST_LEVEL_MONITOR_RETAIN_DAYS: ${ROOMCAST_LEVEL_MONITOR_RETAIN_DAYS:-14}
      ROOMCAST_WATCHDOG_REMEDIATION_ENABLED: ${ROOMCAST_WATCHDOG_REMEDIATION_ENABLED:-1}
      ROOMCAST_WATCHDOG_RESTART_TARGET: ${ROOMCAST_WATCHDOG_RESTART_TARGET:-roomcast}
      ROOMCAST_WATCHDOG_RESTART_COOLDOWN_SECONDS: ${ROOMCAST_WATCHDOG_RESTART_COOLDOWN_SECONDS:-180}
      ROOMCAST_WATCHDOG_STATE_PATH: ${ROOMCAST_WATCHDOG_STATE_PATH:-/app/data/watchdog-state.json}
      ROOMCAST_WATCHDOG_DOCKER_SOCKET: ${ROOMCAST_WATCHDOG_DOCKER_SOCKET:-/var/run/docker.sock}
      ROOMCAST_ALERT_EMAIL_ENABLED: ${ROOMCAST_ALERT_EMAIL_ENABLED:-0}
      ROOMCAST_ALERT_EMAIL_TO: ${ROOMCAST_ALERT_EMAIL_TO:-}
      ROOMCAST_ALERT_EMAIL_FROM: ${ROOMCAST_ALERT_EMAIL_FROM:-}
      ROOMCAST_ALERT_SMTP_HOST: ${ROOMCAST_ALERT_SMTP_HOST:-}
      ROOMCAST_ALERT_SMTP_PORT: ${ROOMCAST_ALERT_SMTP_PORT:-587}
      ROOMCAST_ALERT_SMTP_USERNAME: ${ROOMCAST_ALERT_SMTP_USERNAME:-}
      ROOMCAST_ALERT_SMTP_PASSWORD: ${ROOMCAST_ALERT_SMTP_PASSWORD:-}
      ROOMCAST_ALERT_SMTP_STARTTLS: ${ROOMCAST_ALERT_SMTP_STARTTLS:-1}
      ROOMCAST_ALERT_SUBJECT_PREFIX: ${ROOMCAST_ALERT_SUBJECT_PREFIX:-[RoomCast]}
      ROOMCAST_ALERT_COOLDOWN_SECONDS: ${ROOMCAST_ALERT_COOLDOWN_SECONDS:-900}
      ROOMCAST_ALERT_RESOLVED_ENABLED: ${ROOMCAST_ALERT_RESOLVED_ENABLED:-1}
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - sh
      - -c
      - |
        while true; do
          python3 roomcast_watchdog.py \
            --db-path "$${ROOMCAST_DB_PATH}" \
            --heartbeat-stale-seconds "$${ROOMCAST_WATCHDOG_HEARTBEAT_STALE_SECONDS}" \
            --startup-grace-seconds "$${ROOMCAST_WATCHDOG_STARTUP_GRACE_SECONDS}" \
            --base-url "$${ROOMCAST_WATCHDOG_BASE_URL}" \
            --public-pin "$${ROOMCAST_WATCHDOG_PUBLIC_PIN}" \
            --client-timeout-seconds "$${ROOMCAST_WATCHDOG_CLIENT_TIMEOUT_SECONDS}" \
            --hls-timeout-seconds "$${ROOMCAST_WATCHDOG_HLS_TIMEOUT_SECONDS}" \
            --record-incidents \
            --json || true
          sleep 60
        done
